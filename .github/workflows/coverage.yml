name: coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  COMMIT: ${{ github.sha }}
  PRESET: clang-linux-debug

jobs:
  build-and-test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      matrix:
        PRESET: [clang-linux-debug]
        WORK_ITEM: [CORO,FUNCORO,FUNC]
    steps:
    - uses: actions/checkout@v4
      with:
        repository: tzcnt/tmc-examples
        ref: main
    - name: branch-examples
      continue-on-error: true
      run: git fetch && git checkout ${{env.BRANCH_NAME}}
    - name: submodule-clone
      run: >
        cd submodules
        && git clone https://github.com/tzcnt/TooManyCooks.git
        && git clone https://github.com/tzcnt/tmc-asio.git
    # If a branch with the same name exists in the dependency repos, use that. Otherwise, use main.
    - name: submodule-branch-TMC
      # continue-on-error: true # this should never fail if triggered from TMC workflow
      run: cd submodules/TooManyCooks && git fetch && git checkout ${{env.BRANCH_NAME}}
    - name: submodule-branch-tmc-asio
      continue-on-error: true
      run: cd submodules/tmc-asio && git fetch && git checkout ${{env.BRANCH_NAME}}
    - name: configure
      run: cmake -G "Unix Makefiles" -DTMC_AS_SUBMODULE=ON -DCMD_COMPILE_FLAGS='-DTMC_WORK_ITEM=${{matrix.WORK_ITEM}};-DTMC_TRIVIAL_TASK;-fprofile-instr-generate;-fcoverage-mapping' -DCMD_LINK_FLAGS='-fprofile-instr-generate;-fcoverage-mapping' --preset ${{matrix.PRESET}} .
    - name: build
      run: cmake --build ./build/${{matrix.PRESET}} --parallel $(nproc) --target all
    - name: run tests
      run: LLVM_PROFILE_FILE=tests.profraw ./build/${{matrix.PRESET}}/tests/tests
    - uses: actions/upload-artifact@v4
      with:
        name: ${{env.COMMIT}}-${{matrix.WORK_ITEM}}-tests.profraw
        path: tests.profraw
        retention-days: 1
        overwrite: true
    - uses: actions/upload-artifact@v4
      with:
        name: ${{env.COMMIT}}-${{matrix.WORK_ITEM}}-tests.exe
        path: ./build/${{matrix.PRESET}}/tests/tests
        retention-days: 1
        overwrite: true
      # test_exceptions depends on unknown awaitables which are disabled during the regular tests
      # thus it must be compiled and run separately
    - name: run test_exceptions
      run: LLVM_PROFILE_FILE=test_exceptions.profraw ./build/${{matrix.PRESET}}/tests/test_exceptions
    - uses: actions/upload-artifact@v4
      with:
        name: ${{env.COMMIT}}-${{matrix.WORK_ITEM}}-test_exceptions.profraw
        path: test_exceptions.profraw
        retention-days: 1
        overwrite: true
    - uses: actions/upload-artifact@v4
      with:
        name: ${{env.COMMIT}}-${{matrix.WORK_ITEM}}-test_exceptions.exe
        path: ./build/${{matrix.PRESET}}/tests/test_exceptions
        retention-days: 1
        overwrite: true
    - name: run test_fuzz_chan
      run: LLVM_PROFILE_FILE=test_fuzz_chan.profraw ./build/${{matrix.PRESET}}/tests/test_fuzz_chan
    - uses: actions/upload-artifact@v4
      with:
        name: ${{env.COMMIT}}-${{matrix.WORK_ITEM}}-test_fuzz_chan.profraw
        path: test_fuzz_chan.profraw
        retention-days: 1
        overwrite: true
    - uses: actions/upload-artifact@v4
      with:
        name: ${{env.COMMIT}}-${{matrix.WORK_ITEM}}-test_fuzz_chan.exe
        path: ./build/${{matrix.PRESET}}/tests/test_fuzz_chan
        retention-days: 1
        overwrite: true
  merge-coverage:
    needs: [build-and-test]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        repository: tzcnt/tmc-examples
        ref: main
    - name: branch-examples
      continue-on-error: true
      run: git fetch && git checkout ${{env.BRANCH_NAME}}
    - name: submodule-clone
      run: >
        cd submodules
        && git clone https://github.com/tzcnt/TooManyCooks.git
        && git clone https://github.com/tzcnt/tmc-asio.git
    # If a branch with the same name exists in the dependency repos, use that. Otherwise, use main.
    - name: submodule-branch-TMC
      # continue-on-error: true # this should never fail if triggered from TMC workflow
      run: cd submodules/TooManyCooks && git fetch && git checkout ${{env.BRANCH_NAME}}
    - name: submodule-branch-tmc-asio
      continue-on-error: true
      run: cd submodules/tmc-asio && git fetch && git checkout ${{env.BRANCH_NAME}}
    - uses: actions/download-artifact@v4
      with:
        merge-multiple: true
    - name: merge
      run: |
        llvm-profdata-18 merge -sparse \
        ${{env.COMMIT}}-CORO-tests.profraw \
        ${{env.COMMIT}}-CORO-test_exceptions.profraw \
        ${{env.COMMIT}}-CORO-test_fuzz_chan.profraw \
        ${{env.COMMIT}}-FUNCORO-tests.profraw \
        ${{env.COMMIT}}-FUNCORO-test_exceptions.profraw \
        ${{env.COMMIT}}-FUNCORO-test_fuzz_chan.profraw \
        ${{env.COMMIT}}-FUNC-tests.profraw \
        ${{env.COMMIT}}-FUNC-test_exceptions.profraw \
        ${{env.COMMIT}}-FUNC-test_fuzz_chan.profraw \
        -o coverage.profdata
    - name: show
      run: |
        llvm-cov-18 export -format=lcov -instr-profile=coverage.profdata \
        ${{env.COMMIT}}-CORO-tests.exe \
        ${{env.COMMIT}}-CORO-test_exceptions.exe \
        ${{env.COMMIT}}-CORO-test_fuzz_chan.exe \
        ${{env.COMMIT}}-FUNCORO-tests.exe \
        ${{env.COMMIT}}-FUNCORO-test_exceptions.exe \
        ${{env.COMMIT}}-FUNCORO-test_fuzz_chan.exe \
        ${{env.COMMIT}}-FUNC-tests.exe \
        ${{env.COMMIT}}-FUNC-test_exceptions.exe \
        ${{env.COMMIT}}-FUNC-test_fuzz_chan.exe \
        ./submodules/TooManyCooks/ > ./submodules/TooManyCooks/coverage.info
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{secrets.CODECOV_TOKEN}}
        slug: tzcnt/TooManyCooks
        working-directory: ./submodules/TooManyCooks
